<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Tavern | Hub</title>
    
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tilt.js/1.2.1/tilt.jquery.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nitro-bg"></div>

<nav class="nitro-nav">
    <div class="logo">NITRO.HUB</div>
    <div class="nav-items">
        <button onclick="handleLogin()" id="login-trigger">Cabinet</button>
    </div>
</nav>

<main class="bento-container">
    <div class="bento-item profile-card" data-tilt>
        <div class="status-dot"></div>
        <h2 id="user-display-name">Путник</h2>
        <p>Уровень доступа: Admin</p>
    </div>

    <div class="bento-item chat-card">
        <div id="login-form" class="auth-box">
            <h3>Вход в систему</h3>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="handleLogin()" class="nitro-btn">Connect</button>
        </div>

        <div id="user-info" style="display:none;">
            <div id="chat-window" class="nitro-chat"></div>
            <div class="nitro-input-group">
                <input type="text" id="chat-msg" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="bento-item cats-card">
        <h3>Коты-хранители</h3>
        <div id="cat-container" class="mini-grid"></div>
        <button onclick="fetchCats()" class="refresh-btn">↺</button>
    </div>

    <div class="bento-item stats-card">
        <div class="stat"><span>Messages:</span> 128</div>
        <div class="stat"><span>Uptime:</span> 99.9%</div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
