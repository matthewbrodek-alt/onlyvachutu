<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Tesla Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <nav class="tesla-nav">
        <div class="nav-brand">MY PORTFOLIO</div>
        <div class="nav-center">
            <button onclick="scrollToPanel('home')" data-lang="navHome">Главная</button>
            <button onclick="scrollToPanel('skills')" data-lang="navSkills">Навыки</button>
            <button onclick="scrollToPanel('todo')" data-lang="navTodo">Кабинет</button>
        </div>
        <div class="nav-right">
            <button onclick="toggleLang()" id="lang-btn" class="flag-btn">🇺🇸</button>
            <button onclick="toggleTheme()" id="theme-icon">🌙</button>
        </div>
    </nav>

    <main class="scroll-container">
        <section id="home" class="panel">
            <div class="glass-box">
                <h1 data-lang="welcomeTitle">Привет!</h1>
                <p class="sub-text" data-lang="welcomeSub">Junior Developer & Automation Specialist</p>
                <button onclick="scrollToPanel('todo')" class="btn-tesla-primary" style="width:auto; padding: 15px 40px;">Личный кабинет</button>
            </div>
        </section>

        <section id="todo" class="panel">
            <div class="tesla-auth-card glass-box">
                <h2 data-lang="todoTitle" class="auth-title">Личный кабинет</h2>
                
                <div id="login-form" class="auth-form">
                    <div class="input-wrapper">
                        <label>Email</label>
                        <input type="email" id="auth-email">
                    </div>
                    <div class="input-wrapper">
                        <label>Password</label>
                        <input type="password" id="auth-pass">
                    </div>
                    <button onclick="handleLogin()" class="btn-tesla-primary" data-lang="loginBtn">Войти</button>
                </div>

                <div id="user-info" style="display:none;">
                    <div class="chat-header">
                        <p class="status-dot">● Online</p>
                        <span id="user-display-email"></span>
                    </div>
                    <div id="chat-window" class="tesla-chat"></div>
                    <div class="chat-inputs">
                        <textarea id="chat-msg" data-placeholder="chatMsg" placeholder="Сообщение..."></textarea>
                        <button onclick="sendMessage()" class="btn-tesla-primary" data-lang="sendBtn">Отправить</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
