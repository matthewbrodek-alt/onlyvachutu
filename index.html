<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio 🐱</title>
    <link rel="icon" type="image/png" href="cat_icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <nav>
        <div class="nav-links">
            <button onclick="showPage('home')" data-lang="navHome" class="action-btn">Главная</button>
            <button onclick="showPage('todo-section')" data-lang="navTodo">Задачи</button>
            <button onclick="showPage('about')" data-lang="navAbout">Обо мне</button>
        </div>
        <div class="controls">
            <button onclick="toggleLang()" id="lang-btn">EN</button>
            <button id="theme-toggle" onclick="toggleTheme()" class="theme-btn">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <div id="login-form" class="card">
        <h2 data-lang="authTitle">Вход</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <div class="btn-group">
            <button onclick="handleLogin()" class="action-btn" data-lang="loginBtn">Войти</button>
            <button onclick="handleSignUp()" data-lang="regBtn">Регистрация</button>
        </div>
    </div>

    <div id="user-info" style="display: none;" class="user-bar">
        <span id="user-email-display"></span>
        <button onclick="handleLogout()" data-lang="logoutBtn">Выход</button>
    </div>

    <main>
        <section id="home" class="page">
            <div class="card">
                <h1 data-lang="welcomeTitle">Привет!</h1>
                <button onclick="toggleSecret()" class="action-btn" data-lang="secretBtn">Секрет 🔒</button>
                <div id="secret-msg" style="display:none; padding:10px; border-left: 3px solid #0088cc;">
                    <p data-lang="secretText">Стать Senior в 2026 году! 🚀</p>
                </div>
            </div>

            <div class="card">
                <h3 data-lang="catTitle">Котик дня 🐱</h3>
                <div id="loader" style="display:none;">Loading...</div>
                <img id="cat-image" src="" style="max-width:100%; border-radius:10px; display:none; margin-bottom:10px;">
                <button onclick="getCat()" class="action-btn" data-lang="catBtn">Кыс-кыс!</button>
            </div>
        </section>

        <section id="todo-section" class="page">
            <div class="card">
                <h2 data-lang="todoTitle">Список дел 📝</h2>
                <div class="todo-input-group">
                    <input type="text" id="todo-input" placeholder="...">
                    <button onclick="addTodo()" class="action-btn" data-lang="addBtn">Добавить</button>
                </div>
                <ul id="todo-list" style="width:100%; padding:0; list-style:none;"></ul>
            </div>
        </section>

        <section id="about" class="page">
            <div class="card">
                <h1 data-lang="navAbout">Обо мне</h1>
                <p data-lang="aboutText">Firebase, Telegram API, Реставрация фото.</p>
                <h3 data-lang="tgTitle">Написать в TG 🚀</h3>
                <input type="text" id="tg-name" placeholder="Name">
                <textarea id="tg-msg" placeholder="Message"></textarea>
                <button onclick="sendToTg()" class="action-btn" data-lang="sendBtn">Отправить</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
