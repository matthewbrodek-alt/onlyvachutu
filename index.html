<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Tavern | v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="light-bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="people-layer">
            <div class="person p1"></div>
            <div class="person p2"></div>
        </div>
    </div>

    <nav class="modern-nav">
        <div class="nav-logo">TAVERN.HUB</div>
        <div class="nav-links">
            <button onclick="scrollToPanel('home')">●</button>
            <button onclick="scrollToPanel('portfolio')">●</button>
            <button onclick="scrollToPanel('todo')">●</button>
            <button onclick="scrollToPanel('cats')">●</button>
        </div>
        <button onclick="toggleLang()" id="lang-btn" class="lang-toggle">EN</button>
    </nav>

    <main class="scroll-container">
        
        <section id="home" class="panel">
            <div class="hero-card">
                <h1 data-lang="welcomeTitle">Утро в Таверне</h1>
                <p data-lang="welcomeSub">Современные решения для старых задач</p>
            </div>
        </section>

        <section id="portfolio" class="panel">
            <div class="glass-panel">
                <h2 class="section-title" data-lang="portfolioTitle">Проекты</h2>
                <div class="modern-grid">
                    <div class="project-card" onclick="scrollToPanel('todo')">
                        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400')"></div>
                        <span>WEB</span>
                    </div>
                    <div class="project-card" onclick="scrollToPanel('todo')">
                        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400')"></div>
                        <span>BOTS</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="todo" class="panel">
            <div class="glass-panel chat-container">
                <div id="login-form">
                    <h2 data-lang="todoTitle">Вход</h2>
                    <input type="email" id="auth-email" placeholder="Email" class="m-input">
                    <input type="password" id="auth-pass" placeholder="Password" class="m-input">
                    <button onclick="handleLogin()" class="m-btn">Войти</button>
                </div>
                <div id="user-info" style="display:none; width: 100%;">
                    <div id="chat-window" class="modern-chat"></div>
                    <div class="input-group">
                        <input type="text" id="chat-msg" placeholder="Написать...">
                        <button onclick="sendMessage()">→</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="cats" class="panel">
            <div class="glass-panel cats-board">
                <h2 class="section-title" data-lang="catsTitle">Кото-терапия</h2>
                <div class="stack-wrapper">
                    <div id="cat-container" class="stack-carousel">
                        </div>
                </div>
                <button onclick="fetchCats()" class="refresh-cats">♻ Обновить</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
