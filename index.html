<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Портфолио</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <nav>
        <div class="nav-links">
            <button onclick="showPage('home')">Главная</button>
            <button onclick="showPage('todo-section')">Список дел</button>
            <button onclick="showPage('about')">Обо мне</button>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()" class="theme-btn">
            <span id="theme-icon">🌙</span>
        </button>
    </nav>

    <div id="login-form" class="auth-box">
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleLogin()">Войти</button>
        <button onclick="handleSignUp()">Регистрация</button>
    </div>

    <div id="user-info" style="display: none;">
        <span id="user-email-display"></span>
        <button onclick="handleLogout()">Выход</button>
    </div>

    <section id="home" class="page">
        <h1>Главная страница</h1>
        <p>Добро пожаловать в мое приложение!</p>
    </section>

    <section id="todo-section" class="page" style="display:none;">
        <h2>Список дел</h2>
        <input type="text" id="todo-input" placeholder="Новая задача">
        <button onclick="addTodo()">Добавить</button>
        <ul id="todo-list"></ul>
    </section>

    <section id="about" class="page" style="display:none;">
        <h1>Обо мне</h1>
        <p>Цель: Стать Senior разработчиком в 2026 году!</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
