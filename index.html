<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Hub | Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="video-wrapper">
    <div class="video-overlay"></div>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-dark-background-4462-large.mp4" type="video/mp4">
    </video>
</div>

<nav class="top-nav">
    <div class="logo" onclick="showPage('main')">NITRO<span>HUB</span></div>
    <div class="nav-right">
        <a href="#" onclick="showPage('ads')" class="ads-link" data-lang="adsLink">Реклама</a>
        <button id="lang-btn" class="lang-globe-btn" onclick="toggleLang()">
            <span id="lang-icon">🌐 🇷🇺</span>
        </button>
    </div>
</nav>

<main class="dashboard" id="scroll-area">
    <div id="main-content" class="page-content active tab-profile">
        
        <section class="hero-section">
            <h1 data-lang="heroTitle">A NEW STANDARD OF DIGITAL EXPERIENCE</h1>
            <p data-lang="heroSub">Crafting premium web interfaces and scalable frontend architectures.</p>
            <button class="n-btn primary" data-lang="exploreBtn">Explore Work</button>
        </section>

        <section class="card projects-card full-width-card">
            <h3 data-lang="projectsTitle">Selected Works</h3>
            <div id="portfolio-container" class="portfolio-grid"></div>
        </section>

        <div class="side-column-left">
            <div class="card profile-card">
                <div class="status-wrapper">
                    <div class="status-badge">ONLINE</div>
                    <button id="logout-btn" class="logout-link" onclick="handleLogout()" style="display: none;">Logout ➔</button>
                </div>
                <h2 id="user-name">Guest</h2>
                <p class="sub" data-lang="welcomeSub">Маг Автоматизации</p>
            </div>
            <div class="card stack-card">
                <h3 data-lang="skillTech">Arsenal</h3>
                <div class="stack-list-chips">
                    <span>React</span> <span>Vue</span> <span>Firebase</span> <span>Python</span>
                </div>
            </div>
        </div>

        <div class="card chat-card mobile-target-chat">
            <div id="login-form" class="auth-box">
                <h3 data-lang="todoTitle">Secret Entrance</h3>
                <input type="email" id="auth-email" placeholder="Email" class="n-input">
                <input type="password" id="auth-pass" placeholder="Password" class="n-input">
                <button onclick="handleLogin()" class="n-btn primary" data-lang="loginBtn">Authorize</button>
            </div>
            <div id="user-info" style="display:none;" class="chat-main-container">
                <div id="chat-window" class="chat-feed"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-msg" placeholder="Write a message..." class="n-input">
                    <button onclick="sendMessage()" class="send-circle-btn">➔</button>
                </div>
            </div>
        </div>

        <div class="card cats-card mobile-target-cats">
            <h3 data-lang="catsTitle">Tavern Cats</h3>
            <div id="cat-container" class="cat-viewer"></div>
            <button onclick="fetchCats()" class="n-btn secondary" data-lang="catsBtn">Summon</button>
        </div>
    </div>

    <div id="ads-page" class="page-content">
        <div class="card ads-card">
            <h1 data-lang="promoText">Здесь могла быть ваша реклама</h1>
            <p>Contact: @your_telegram</p>
        </div>
    </div>
</main>

<button id="unmute-btn" onclick="toggleVideoSound()">🔊</button>

<nav class="mobile-nav" id="mob-nav">
    <button class="nav-btn active-btn" onclick="switchMobileTab('profile', this)">👤</button>
    <button class="nav-btn" onclick="switchMobileTab('chat', this)">💬</button>
    <button class="nav-btn" onclick="switchMobileTab('cats', this)">🐱</button>
</nav>

<script src="script.js"></script>
</body>
</html>
