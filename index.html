<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Tavern v2</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="top-nav">
    <div class="logo">NITRO<span>HUB</span></div>
    <button id="lang-btn">🇺🇸 EN</button>
</nav>

<main class="dashboard">
    <aside class="side-panel">
        <div class="card profile-card">
            <div class="badge">Online</div>
            <h2 id="user-name">Путник</h2>
            <p class="sub" data-lang="welcomeSub">Automation Mage</p>
        </div>
        <div class="card skills-card">
            <h3 data-lang="skillTech">Арсенал</h3>
            <ul>
                <li>JS Alchemy</li>
                <li>Python Runes</li>
                <li>Firebase Souls</li>
            </ul>
        </div>
    </aside>

    <section class="main-content">
        <div class="card chat-card">
            <div id="login-form" class="auth-box">
                <h3 data-lang="todoTitle">Тайная комната</h3>
                <input type="email" id="auth-email" placeholder="Email" class="n-input">
                <input type="password" id="auth-pass" placeholder="Password" class="n-input">
                <button onclick="handleLogin()" class="n-btn primary" data-lang="loginBtn">Войти</button>
            </div>

            <div id="user-info" style="display:none;" class="chat-wrapper">
                <div id="chat-window" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-msg" placeholder="Послать ворона..." class="n-input">
                    <button onclick="sendMessage()" class="send-btn">➔</button>
                </div>
            </div>
        </div>
    </section>

    <aside class="side-panel">
        <div class="card cats-card">
            <h3 data-lang="catsTitle">Коты Таверны</h3>
            <div id="cat-container" class="cat-viewer"></div>
            <button onclick="fetchCats()" class="n-btn secondary">Приманить еще</button>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
