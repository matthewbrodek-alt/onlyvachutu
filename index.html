<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Hub | Tavern Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
</head>
<body>

<div class="video-bg-container">
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="bg_video.mp4" type="video/mp4">
    </video>
</div>

<nav class="top-nav">
    <div class="logo neon-text" onclick="showPage('main')">NITRO<span>HUB</span></div>
    <div class="nav-center">
        <a href="#" class="projects-link-nav neon-text" onclick="showPage('projects-page')" data-lang="projectsLink">МОИ ПРОЕКТЫ</a>
    </div>
    <div class="nav-right">
        <button id="lang-btn" class="lang-btn neon-border" onclick="toggleLang()">
            <span id="lang-icon">🇷🇺</span>
        </button>
    </div>
</nav>

<main class="dashboard" id="main-scroll">
    <div id="main-content" class="view-container active">
        <div class="main-grid">
            <div class="col-side">
                <div class="card profile-card" data-tilt>
                    <div class="status-badge neon-border neon-text">ONLINE</div>
                    <h2 id="user-name" class="neon-text">Guest</h2>
                    <p class="sub" data-lang="welcomeSub">Маг Автоматизации</p>
                    <button id="logout-btn" class="logout-link neon-text" onclick="handleLogout()" style="display:none">Logout ➔</button>
                </div>
                
                <div class="card chat-card" data-tilt data-tilt-max="5">
                    <h3 data-lang="chatTitle">Messenger</h3>
                    <div id="login-form" class="auth-box">
                        <input type="email" id="auth-email" placeholder="Email" class="n-input">
                        <input type="password" id="auth-pass" placeholder="Pass" class="n-input">
                        <button onclick="handleLogin()" class="n-btn primary" data-lang="loginBtn">Войти</button>
                    </div>
                    <div id="user-info" style="display:none;" class="chat-inner">
                        <div id="chat-window" class="chat-feed"></div>
                        <div class="chat-input-row">
                            <input type="text" id="chat-msg" placeholder="..." class="n-input">
                            <button onclick="sendMessage()" class="send-btn">➔</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-center">
                <div class="card about-card" data-tilt>
                    <h3 data-lang="aboutTitle">Michael Faraday</h3>
                    <div class="faraday-content">
                        <p data-lang="faradayDesc">Майкл Фарадей — английский физик, внесший вклад в электромагнетизм.</p>
                        <div class="quote" data-lang="faradayQuote">"Ничто не слишком чудесно, чтобы быть истинным."</div>
                    </div>
                </div>
                <div class="card projects-card">
                    <h3 class="neon-text" data-lang="worksTitle">Выбранные Работы</h3>
                    <div id="portfolio-container" class="portfolio-list"></div>
                </div>
            </div>

            <div class="col-side">
                <div class="card tech-card" data-tilt>
                    <h3 data-lang="skillTech">Arsenal</h3>
                    <div class="tech-tags">
                        <span class="neon-border">React</span> <span class="neon-border">Firebase</span> 
                        <span class="neon-border">Python</span> <span class="neon-border">UI/UX</span>
                    </div>
                </div>
                <div class="card cats-card" data-tilt>
                    <h3 data-lang="catsTitle">Tavern Cats</h3>
                    <div id="cat-container" class="cat-box"></div>
                    <button onclick="fetchCats()" class="n-btn secondary" data-lang="catsBtn">Призвать</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
