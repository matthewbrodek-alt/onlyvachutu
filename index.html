<main class="container">
  <section class="panel home-bg">
    <div class="content">
      <h1 data-lang="welcomeTitle">Привет!</h1>
      <p>Стать Senior в 2026 году! 🚀</p>
    </div>
    <div class="buttons">
      <button onclick="showPage('todo-section')" class="btn-primary">Задачи</button>
      <button onclick="toggleSecret()" class="btn-secondary">Секрет</button>
    </div>
  </section>

  <section class="panel cat-bg">
    <div class="content">
      <h2 data-lang="catTitle">Котик дня</h2>
      <div id="loader" style="display:none;">Загрузка...</div>
      <img id="cat-image" src="" style="display:none; max-width: 80%; border-radius: 20px;">
    </div>
    <div class="buttons">
      <button onclick="getCat()" class="btn-primary">Кыс-кыс!</button>
    </div>
  </section>

  <section id="chat-panel" class="panel chat-bg" style="display: none;">
    <div class="content">
      <h2 data-lang="tgTitle">Чат со мной</h2>
      <div id="chat-window" class="tesla-chat"></div>
    </div>
    </section>
</main>
